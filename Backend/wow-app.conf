server {
    server_name wow-app.zhilalkrisna.my.id; # Ganti dengan IP VPS atau Domain Anda

    # 1. Konfigurasi Frontend (React)
    location / {
        root /var/www/wow-frontend/; # Lokasi folder build React
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # Penting untuk React Router!
    }

    # 2. Konfigurasi Backend API
    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;

        # --- WAJIB ADA UTK MENDAPATKAN IP ASLI ---
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Konfigurasi Uploads (Gambar)
    # Sesuai server.js, gambar ada di folder 'uploads'
    location /uploads {
        # OPSI A: Biarkan Node.js yang handle (karena ada middleware verifyToken di server.js)
        proxy_pass http://localhost:3000;

        # OPSI B: Jika ingin bypass verifyToken agar gambar publik & lebih cepat:
        # alias /var/www/wow-backend/uploads;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/wow-app.zhilalkrisna.my.id/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/wow-app.zhilalkrisna.my.id/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = wow-app.zhilalkrisna.my.id) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name wow-app.zhilalkrisna.my.id;
    return 404; # managed by Certbot


}
   